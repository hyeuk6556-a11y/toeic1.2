<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a2e">
<title>토익 노랭이 N회독 암기</title>
<style>
  :root {
    --bg: #f5f3ee;
    --bg-card: #ffffff;
    --text: #1a1a2e;
    --text-sub: #6b6b7c;
    --text-light: #a0a0ad;
    --accent: #ff6b4a;
    --accent-soft: #ffe8e2;
    --success: #2bb673;
    --success-soft: #d4f4e3;
    --danger: #e63946;
    --danger-soft: #fce4e6;
    --bookmark: #f4b942;
    --border: #e8e6e0;
    --shadow-sm: 0 2px 8px rgba(26, 26, 46, 0.04);
    --shadow-md: 0 4px 20px rgba(26, 26, 46, 0.08);
    --shadow-lg: 0 8px 40px rgba(26, 26, 46, 0.12);
    --radius-sm: 12px;
    --radius-md: 18px;
    --radius-lg: 24px;
    --font-serif: 'Noto Serif KR', 'Playfair Display', Georgia, serif;
    --font-sans: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  html, body {
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overscroll-behavior: none;
    line-height: 1.5;
  }

  body {
    padding-bottom: env(safe-area-inset-bottom);
    padding-top: env(safe-area-inset-top);
  }

  #app {
    max-width: 600px;
    margin: 0 auto;
    min-height: 100vh;
    position: relative;
  }

  /* ==== HEADER ==== */
  .header {
    padding: 24px 20px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg);
    position: sticky;
    top: 0;
    z-index: 10;
    border-bottom: 1px solid transparent;
    transition: border-color 0.2s;
  }

  .header.scrolled {
    border-bottom-color: var(--border);
  }

  .header-title {
    font-family: var(--font-serif);
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  .header-title .accent {
    color: var(--accent);
  }

  .back-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: none;
    background: var(--bg-card);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: var(--shadow-sm);
    transition: transform 0.15s;
  }

  .back-btn:active {
    transform: scale(0.92);
  }

  .back-btn svg {
    width: 18px;
    height: 18px;
    stroke: var(--text);
  }

  /* ==== HOME ==== */
  .home-intro {
    padding: 8px 20px 24px;
  }

  .home-greeting {
    font-size: 14px;
    color: var(--text-sub);
    margin-bottom: 6px;
  }

  .home-stat-row {
    display: flex;
    gap: 12px;
    margin-top: 16px;
  }

  .stat-card {
    flex: 1;
    background: var(--bg-card);
    border-radius: var(--radius-md);
    padding: 16px;
    box-shadow: var(--shadow-sm);
  }

  .stat-card.accent {
    background: var(--text);
    color: #fff;
  }

  .stat-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-sub);
    margin-bottom: 6px;
  }

  .stat-card.accent .stat-label {
    color: rgba(255, 255, 255, 0.6);
  }

  .stat-value {
    font-family: var(--font-serif);
    font-size: 28px;
    font-weight: 700;
    line-height: 1;
  }

  .stat-value .unit {
    font-size: 13px;
    font-weight: 400;
    color: var(--text-sub);
    margin-left: 2px;
  }

  .stat-card.accent .stat-value .unit {
    color: rgba(255, 255, 255, 0.6);
  }

  .quick-menu {
    padding: 0 20px 8px;
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }

  .quick-btn {
    flex: 1;
    padding: 14px 12px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    font-family: var(--font-sans);
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: all 0.15s;
  }

  .quick-btn:active {
    transform: scale(0.97);
    background: var(--accent-soft);
  }

  .quick-btn svg {
    width: 16px;
    height: 16px;
  }

  .quick-btn.bookmark-btn svg {
    fill: var(--bookmark);
    stroke: var(--bookmark);
  }

  .quick-btn.review-btn svg {
    fill: none;
    stroke: var(--accent);
    stroke-width: 2;
  }

  /* ==== CHAPTER LIST ==== */
  .chapter-list {
    padding: 0 20px 40px;
  }

  .section-title {
    font-family: var(--font-serif);
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-sub);
    margin: 20px 0 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .chapter-item {
    background: var(--bg-card);
    border-radius: var(--radius-md);
    margin-bottom: 12px;
    box-shadow: var(--shadow-sm);
    overflow: hidden;
    transition: box-shadow 0.2s;
  }

  .chapter-item.expanded {
    box-shadow: var(--shadow-md);
  }

  .chapter-header {
    padding: 18px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    gap: 12px;
  }

  .chapter-info {
    flex: 1;
    min-width: 0;
  }

  .chapter-num {
    font-family: var(--font-serif);
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  .chapter-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .chapter-meta {
    font-size: 12px;
    color: var(--text-sub);
    margin-top: 3px;
  }

  .chapter-arrow {
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.25s;
    flex-shrink: 0;
  }

  .chapter-item.expanded .chapter-arrow {
    transform: rotate(180deg);
  }

  .chapter-arrow svg {
    width: 14px;
    height: 14px;
    stroke: var(--text-sub);
  }

  .subchapter-list {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease-out;
  }

  .chapter-item.expanded .subchapter-list {
    max-height: 2000px;
  }

  .subchapter-item {
    padding: 14px 18px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    gap: 10px;
    transition: background 0.15s;
  }

  .subchapter-item:active {
    background: var(--accent-soft);
  }

  .sub-info {
    flex: 1;
    min-width: 0;
  }

  .sub-label {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .sub-id {
    font-family: var(--font-serif);
    font-weight: 700;
    color: var(--accent);
    font-size: 13px;
  }

  .sub-meta {
    font-size: 11px;
    color: var(--text-light);
    margin-top: 2px;
  }

  .sub-right {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .review-badge {
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    font-family: var(--font-serif);
  }

  .review-badge.zero {
    background: var(--border);
    color: var(--text-sub);
  }

  .review-badge.one {
    background: var(--accent-soft);
    color: var(--accent);
  }

  .review-badge.multi {
    background: var(--success-soft);
    color: var(--success);
  }

  .progress-ring {
    width: 24px;
    height: 24px;
  }

  /* ==== STUDY VIEW ==== */
  .study-view {
    display: none;
    flex-direction: column;
    min-height: 100vh;
    padding: 0 20px 20px;
  }

  .study-view.active {
    display: flex;
  }

  .study-header {
    padding: 16px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .study-title-group {
    text-align: center;
    flex: 1;
  }

  .study-sub-id {
    font-family: var(--font-serif);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 600;
  }

  .study-count {
    font-size: 13px;
    color: var(--text-sub);
    margin-top: 2px;
  }

  .progress-bar-wrap {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin: 0 0 24px;
  }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #ff8a6f);
    border-radius: 2px;
    transition: width 0.3s;
  }

  .card-stack {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    min-height: 340px;
    padding: 16px 0;
  }

  .flashcard {
    width: 100%;
    background: var(--bg-card);
    border-radius: var(--radius-lg);
    padding: 36px 24px;
    box-shadow: var(--shadow-md);
    text-align: center;
    cursor: pointer;
    position: relative;
    min-height: 320px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    user-select: none;
    -webkit-user-select: none;
    transition: transform 0.2s;
    border: 1px solid var(--border);
  }

  .flashcard.flip-anim {
    animation: cardFlip 0.4s ease;
  }

  @keyframes cardFlip {
    0% { transform: rotateY(0); }
    50% { transform: rotateY(90deg); }
    100% { transform: rotateY(0); }
  }

  .flashcard.enter-anim {
    animation: cardEnter 0.35s ease;
  }

  @keyframes cardEnter {
    0% { transform: translateX(30px); opacity: 0; }
    100% { transform: translateX(0); opacity: 1; }
  }

  .bookmark-toggle {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 44px;
    height: 44px;
    border: none;
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    transition: background 0.15s;
  }

  .bookmark-toggle:active {
    background: var(--border);
  }

  .bookmark-toggle svg {
    width: 26px;
    height: 26px;
    stroke: var(--text-light);
    stroke-width: 2;
    fill: transparent;
    transition: all 0.2s;
  }

  .bookmark-toggle.active svg {
    stroke: var(--bookmark);
    fill: var(--bookmark);
    transform: scale(1.1);
  }

  .card-tag {
    position: absolute;
    top: 20px;
    left: 20px;
    font-family: var(--font-serif);
    font-size: 10px;
    color: var(--text-light);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 600;
  }

  .word-english {
    font-family: var(--font-serif);
    font-size: 42px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.1;
    margin-top: 12px;
    word-break: break-word;
  }

  .word-korean {
    font-size: 22px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.45;
    word-break: keep-all;
    display: none;
  }

  .word-korean.visible {
    display: block;
    animation: fadeUp 0.3s ease;
  }

  @keyframes fadeUp {
    0% { opacity: 0; transform: translateY(8px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  .card-hint {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    color: var(--text-light);
    letter-spacing: 0.05em;
  }

  .card-hint.hide {
    display: none;
  }

  /* ==== ACTION BUTTONS ==== */
  .action-row {
    display: flex;
    gap: 12px;
    padding-top: 16px;
  }

  .action-btn {
    flex: 1;
    padding: 20px 16px;
    border: none;
    border-radius: var(--radius-md);
    font-family: var(--font-sans);
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: var(--shadow-sm);
  }

  .action-btn:active {
    transform: scale(0.96);
  }

  .action-btn.dont-know {
    background: var(--bg-card);
    color: var(--danger);
    border: 2px solid var(--danger);
  }

  .action-btn.know {
    background: var(--success);
    color: #fff;
  }

  .action-btn.disabled {
    opacity: 0.35;
    pointer-events: none;
  }

  .action-btn svg {
    width: 20px;
    height: 20px;
    stroke-width: 2.5;
  }

  /* ==== COMPLETION ==== */
  .completion-overlay {
    position: fixed;
    inset: 0;
    background: rgba(26, 26, 46, 0.88);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
  }

  .completion-overlay.visible {
    display: flex;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .completion-card {
    background: var(--bg-card);
    border-radius: var(--radius-lg);
    padding: 40px 28px 28px;
    text-align: center;
    max-width: 340px;
    width: 100%;
    animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes popIn {
    0% { transform: scale(0.8); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  .completion-icon {
    font-family: var(--font-serif);
    font-size: 56px;
    margin-bottom: 8px;
  }

  .completion-title {
    font-family: var(--font-serif);
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .completion-desc {
    font-size: 14px;
    color: var(--text-sub);
    line-height: 1.6;
    margin-bottom: 24px;
  }

  .completion-desc .badge {
    display: inline-block;
    background: var(--accent);
    color: #fff;
    padding: 2px 10px;
    border-radius: 12px;
    font-weight: 700;
    font-family: var(--font-serif);
    margin: 0 2px;
  }

  .completion-actions {
    display: flex;
    gap: 10px;
  }

  .comp-btn {
    flex: 1;
    padding: 14px;
    border: none;
    border-radius: var(--radius-sm);
    font-family: var(--font-sans);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }

  .comp-btn.primary {
    background: var(--text);
    color: #fff;
  }

  .comp-btn.secondary {
    background: var(--border);
    color: var(--text);
  }

  .comp-btn:active {
    transform: scale(0.97);
  }

  /* ==== EMPTY STATE ==== */
  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-sub);
  }

  .empty-state-icon {
    font-size: 48px;
    margin-bottom: 12px;
    opacity: 0.4;
  }

  .empty-state-title {
    font-family: var(--font-serif);
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
  }

  .empty-state-desc {
    font-size: 13px;
    line-height: 1.6;
  }

  /* ==== BOOKMARK VIEW ==== */
  .bookmark-list {
    padding: 0 20px 40px;
  }

  .bookmark-word-item {
    background: var(--bg-card);
    border-radius: var(--radius-md);
    padding: 16px;
    margin-bottom: 10px;
    box-shadow: var(--shadow-sm);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .bw-info {
    flex: 1;
    min-width: 0;
  }

  .bw-english {
    font-family: var(--font-serif);
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 2px;
  }

  .bw-korean {
    font-size: 13px;
    color: var(--text-sub);
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }

  .bw-source {
    font-family: var(--font-serif);
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 4px;
    font-weight: 600;
  }

  .bw-remove {
    width: 36px;
    height: 36px;
    border: none;
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .bw-remove svg {
    width: 22px;
    height: 22px;
    fill: var(--bookmark);
    stroke: var(--bookmark);
  }

  /* ==== SETTINGS MODAL ==== */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(26, 26, 46, 0.5);
    display: none;
    align-items: flex-end;
    justify-content: center;
    z-index: 50;
  }

  .modal-overlay.visible {
    display: flex;
    animation: fadeIn 0.2s ease;
  }

  .modal-content {
    background: var(--bg-card);
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    padding: 24px 20px 32px;
    max-width: 600px;
    width: 100%;
    animation: slideUp 0.3s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .modal-title {
    font-family: var(--font-serif);
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 16px;
  }

  .modal-menu-item {
    padding: 16px 0;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
  }

  .modal-menu-item:last-child {
    border-bottom: none;
  }

  .modal-menu-item .label {
    font-size: 15px;
    font-weight: 500;
  }

  .modal-menu-item .desc {
    font-size: 12px;
    color: var(--text-sub);
    margin-top: 2px;
  }

  .modal-menu-item.danger .label {
    color: var(--danger);
  }

  /* Small screens */
  @media (max-width: 360px) {
    .word-english { font-size: 34px; }
    .word-korean { font-size: 19px; }
    .action-btn { padding: 16px 12px; font-size: 15px; }
    .chapter-title { font-size: 15px; }
  }

  /* Safe area */
  .study-view {
    padding-bottom: calc(20px + env(safe-area-inset-bottom));
  }
</style>
</head>
<body>
<div id="app">
  <!-- HOME VIEW -->
  <div id="home-view">
    <header class="header" id="home-header">
      <div>
        <div class="home-greeting">Today's Vocabulary</div>
        <div class="header-title">노랭이 <span class="accent">N회독</span></div>
      </div>
      <button class="back-btn" id="settings-btn" aria-label="설정">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </header>

    <div class="home-intro">
      <div class="home-stat-row">

// ================= CHAPTER / SUBCHAPTER BUILDER =================
// Chapter 1 = Day 1~2, Chapter 2 = Day 3~4, ... Chapter 15 = Day 29~30
// Subchapter = 25 words each (last subchapter may have less)
function buildChapters() {
  const chapters = [];
  for (let i = 0; i < 15; i++) {
    const dayA = RAW_DAYS[i * 2];
    const dayB = RAW_DAYS[i * 2 + 1];
    const allWords = [];
    dayA.words.forEach(([en, ko]) => allWords.push({en, ko, src: `Day ${dayA.day}`}));
    dayB.words.forEach(([en, ko]) => allWords.push({en, ko, src: `Day ${dayB.day}`}));

    const subs = [];
    for (let s = 0; s < allWords.length; s += 25) {
      subs.push(allWords.slice(s, s + 25));
    }

    chapters.push({
      num: i + 1,
      title: `${dayA.title} · ${dayB.title}`,
      dayRange: `Day ${dayA.day}-${dayB.day}`,
      total: allWords.length,
      subs
    });
  }
  return chapters;
}

const CHAPTERS = buildChapters();

// ================= STATE =================
const STORAGE_KEY = 'vocab_app_state_v1';

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultState();
    const parsed = JSON.parse(raw);
    // Merge with default to handle schema upgrades
    return { ...defaultState(), ...parsed };
  } catch (e) {
    return defaultState();
  }
}

function defaultState() {
  return {
    reviewCounts: {},    // { "1-1": 3, ... }
    bookmarks: {},       // { "en_word": { en, ko, src } }
    progress: {},        // { "1-1": { remaining: [idx,...], total: 25 } }
    lastStudied: null    // "1-2"
  };
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch (e) {
    console.warn('Save failed', e);
  }
}

let state = loadState();

// ================= STUDY SESSION =================
let session = null;
/* session structure:
{
  chapterNum, subIdx, subId: "1-1",
  words: [...],          // the 25 words (or fewer)
  queue: [idx, ...],     // indices remaining to master (shuffled, cycles)
  currentIdx: number,    // index into words
  flipped: boolean,
  totalWords: number,
  masteredInCycle: Set,  // mastered words indices (for overall progress)
  totalMastered: number
}
*/

      const reviews = state.reviewCounts[subId] || 0;
      const hasProgress = state.progress[subId] && state.progress[subId].remaining && state.progress[subId].remaining.length > 0 && state.progress[subId].remaining.length < subWords.length;

      let badgeClass = 'zero';
      if (reviews >= 2) badgeClass = 'multi';

// ================= STUDY FLOW =================
function startStudy(chapterNum, subIdx) {
  const ch = CHAPTERS[chapterNum - 1];
  const words = ch.subs[subIdx];
  const subId = `${chapterNum}-${subIdx + 1}`;

  // Resume or initialize
  const existing = state.progress[subId];
  let queue;
  let totalMastered = 0;

  if (existing && existing.remaining && existing.remaining.length > 0 && existing.total === words.length) {
    queue = [...existing.remaining];
    totalMastered = words.length - queue.length;
  } else {
    queue = words.map((_, i) => i);
    shuffle(queue);
  }

  session = {
    chapterNum,
    subIdx,
    subId,
    words,
    queue,
    currentIdx: null,
    flipped: false,
    totalWords: words.length,
    totalMastered
  };

  state.lastStudied = subId;
  saveState();

  document.getElementById('home-view').style.display = 'none';
  document.getElementById('bookmark-view').style.display = 'none';
  document.getElementById('study-view').classList.add('active');
  document.getElementById('study-sub-id').textContent = `Sub ${subId}`;

  nextCard(true);
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function nextCard(firstTime = false) {
  if (!session) return;

  if (session.queue.length === 0) {
    completeSub();
    return;
  }

  // Pop the first item
  session.currentIdx = session.queue[0];
  session.flipped = false;

  const word = session.words[session.currentIdx];

  const card = document.getElementById('flashcard');
  const engEl = document.getElementById('word-english');
  const korEl = document.getElementById('word-korean');
  const hint = document.getElementById('card-hint');
  const tag = document.getElementById('card-tag');

  engEl.textContent = word.en;
  korEl.textContent = word.ko;
  korEl.classList.remove('visible');
  hint.classList.remove('hide');
  tag.textContent = word.src;

  // Bookmark toggle state
  const bm = document.getElementById('bookmark-toggle');
  if (state.bookmarks[word.en]) {
    bm.classList.add('active');
  } else {
    bm.classList.remove('active');
  }

  // Disable action buttons until flipped
  document.getElementById('btn-know').classList.add('disabled');
  document.getElementById('btn-dontknow').classList.add('disabled');

  // Progress
  updateStudyProgress();

  // Animation
  if (!firstTime) {
    card.classList.remove('enter-anim');
    void card.offsetWidth;
    card.classList.add('enter-anim');
  }
}

function updateStudyProgress() {
  if (!session) return;
  const total = session.totalWords;
  const remaining = session.queue.length;
  const mastered = total - new Set(session.queue).size;
  // "mastered" = words no longer in queue
  document.getElementById('study-count').textContent = `${mastered} / ${total}`;
  const pct = total ? (mastered / total) * 100 : 0;
  document.getElementById('progress-bar').style.width = `${pct}%`;
}

function flipCard() {
  if (!session || session.flipped) return;
  session.flipped = true;
  const korEl = document.getElementById('word-korean');
  const hint = document.getElementById('card-hint');
  const card = document.getElementById('flashcard');

  korEl.classList.add('visible');
  hint.classList.add('hide');

  card.classList.remove('flip-anim');
  void card.offsetWidth;
  card.classList.add('flip-anim');

  document.getElementById('btn-know').classList.remove('disabled');
  document.getElementById('btn-dontknow').classList.remove('disabled');
}

function markWord(known) {
  if (!session || !session.flipped) return;

  const curIdx = session.currentIdx;
  // Remove first occurrence
  session.queue.shift();

  if (!known) {
    // Put back at the end (infinite loop until mastered)
    session.queue.push(curIdx);
  }

  // Save progress
  state.progress[session.subId] = {
    remaining: [...session.queue],
    total: session.totalWords
  };
  saveState();

  if (session.queue.length === 0) {
    completeSub();
    return;
  }
  nextCard();
}

function completeSub() {
  // Increment review count
  const subId = session.subId;
  state.reviewCounts[subId] = (state.reviewCounts[subId] || 0) + 1;
  // Clear progress
  delete state.progress[subId];
  saveState();

  // Show completion overlay
  const reviews = state.reviewCounts[subId];
  document.getElementById('completion-badge').textContent = `${reviews}회독`;
  document.getElementById('completion-overlay').classList.add('visible');
}

function closeCompletion() {
  document.getElementById('completion-overlay').classList.remove('visible');
}

function restartCurrent() {
  if (!session) return;
  startStudy(session.chapterNum, session.subIdx);
}

function exitStudy() {
  session = null;
  document.getElementById('study-view').classList.remove('active');
  document.getElementById('home-view').style.display = '';
  document.getElementById('bookmark-view').style.display = 'none';
  renderHome();
}

function toggleBookmark() {
  if (!session) return;
  const word = session.words[session.currentIdx];
  const key = word.en;
  const bm = document.getElementById('bookmark-toggle');

  if (state.bookmarks[key]) {
    delete state.bookmarks[key];
    bm.classList.remove('active');
  } else {
    state.bookmarks[key] = { en: word.en, ko: word.ko, src: word.src };
    bm.classList.add('active');
  }
  saveState();
}

// ================= BOOKMARK VIEW =================
function openBookmarks() {
  document.getElementById('home-view').style.display = 'none';
  document.getElementById('study-view').classList.remove('active');
  document.getElementById('bookmark-view').style.display = '';
  renderBookmarks();
}

function renderBookmarks() {
  const list = document.getElementById('bookmark-list');
  const items = Object.values(state.bookmarks);

  if (items.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">☆</div>
        <div class="empty-state-title">북마크한 단어가 없어요</div>
        <div class="empty-state-desc">학습 중 별표를 눌러<br>어려운 단어를 모아보세요.</div>
      </div>
    `;
    return;
  }

  list.innerHTML = '';
  items.forEach(word => {
    const el = document.createElement('div');
    el.className = 'bookmark-word-item';
    el.innerHTML = `
      <div class="bw-info">
        <div class="bw-english">${escapeHtml(word.en)}</div>
        <div class="bw-korean">${escapeHtml(word.ko)}</div>
        <div class="bw-source">${escapeHtml(word.src)}</div>
      </div>
      <button class="bw-remove" aria-label="북마크 해제">
        <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      </button>
    `;
    el.querySelector('.bw-remove').addEventListener('click', () => {
      delete state.bookmarks[word.en];
      saveState();
      renderBookmarks();
    });
    list.appendChild(el);
  });
}

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

// ================= CONTINUE / RESUME =================
function continueStudy() {
  // Priority: last studied sub with progress, else first sub with progress, else Sub 1-1
  if (state.lastStudied && state.progress[state.lastStudied]) {
    const [c, s] = state.lastStudied.split('-').map(Number);
    startStudy(c, s - 1);
    return;
  }
  const progressKeys = Object.keys(state.progress);
  if (progressKeys.length > 0) {
    const [c, s] = progressKeys[0].split('-').map(Number);
    startStudy(c, s - 1);
    return;
  }
  // Default: find first uncompleted
  for (const ch of CHAPTERS) {
    for (let si = 0; si < ch.subs.length; si++) {
      const subId = `${ch.num}-${si + 1}`;
      if (!state.reviewCounts[subId]) {
        startStudy(ch.num, si);
        return;
      }
    }
  }
  // Everything done, start from Sub 1-1
  startStudy(1, 0);
}

// ================= SETTINGS =================
function openSettings() {
  document.getElementById('settings-modal').classList.add('visible');
}
function closeSettings(e) {
  if (e && e.target.id !== 'settings-modal') return;
  document.getElementById('settings-modal').classList.remove('visible');
}
function resetProgress() {
  if (!confirm('현재 학습 중인 모든 소분류의 진행도를 초기화할까요?\n(회독수와 북마크는 유지됩니다)')) return;
  state.progress = {};
  saveState();
  document.getElementById('settings-modal').classList.remove('visible');
  renderHome();
}
function resetAllData() {
  if (!confirm('정말 모든 데이터를 초기화할까요?\n회독수, 북마크, 학습 진행도가 모두 삭제됩니다.')) return;
  state = defaultState();
  saveState();
  document.getElementById('settings-modal').classList.remove('visible');
  renderHome();
}

function goHome() {
  document.getElementById('home-view').style.display = '';
  document.getElementById('bookmark-view').style.display = 'none';
  document.getElementById('study-view').classList.remove('active');
  renderHome();
}

// ================= INIT =================
function init() {
  renderHome();
  document.getElementById('open-bookmarks').addEventListener('click', openBookmarks);
  document.getElementById('open-continue').addEventListener('click', continueStudy);
  document.getElementById('settings-btn').addEventListener('click', openSettings);

  // Header scroll shadow
  const header = document.getElementById('home-header');
  window.addEventListener('scroll', () => {
    if (window.scrollY > 10) header.classList.add('scrolled');
    else header.classList.remove('scrolled');
  }, { passive: true });

  // Expose global fns needed by onclick handlers
  window.flipCard = flipCard;
  window.markWord = markWord;
  window.toggleBookmark = toggleBookmark;
  window.exitStudy = exitStudy;
  window.goHome = goHome;
  window.closeCompletion = closeCompletion;
  window.restartCurrent = restartCurrent;
  window.closeSettings = closeSettings;
  window.resetProgress = resetProgress;
  window.resetAllData = resetAllData;
}

document.addEventListener('DOMContentLoaded', init);

</script>
</body>
